name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -e "backend/.[dev]"
      # Keep CI aligned with the current codebase baseline. Full ruff/mypy
      # adoption needs a dedicated cleanup pass; for now, fail only on syntax
      # errors / undefined names and on hermetic unit tests.
      - run: cd backend && ruff check . --select E9,F821
      - run: cd backend && python -m compileall -q dystore tests
      - run: cd backend && pytest -q --ignore=tests/api

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm, cache-dependency-path: web/pnpm-lock.yaml }
      - run: cd web && pnpm install --frozen-lockfile || pnpm install
      - run: cd web && pnpm typecheck
      - run: cd web && pnpm exec vitest run --passWithNoTests
      - run: cd web && pnpm build
